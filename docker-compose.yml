services:
  postgres:
    image: postgres:16-alpine
    container_name: cnpj-data-hub-postgres
    environment:
      POSTGRES_DB: cnpj_data_hub
      POSTGRES_USER: cnpj_user
      POSTGRES_PASSWORD: cnpj_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cnpj_user -d cnpj_data_hub"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: cnpj-data-hub-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
    container_name: cnpj-data-hub-api
    env_file:
      - .env
    working_dir: /app
    volumes:
      - .:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker:
    build:
      context: .
    container_name: cnpj-data-hub-worker
    env_file:
      - .env
    working_dir: /app
    volumes:
      - .:/app
    command: python -m app.workers.worker
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  postgres_data:
